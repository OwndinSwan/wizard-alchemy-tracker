name: Fetch Latest Codes

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows you to run it manually

jobs:
  update-codes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetches full history so git doesn't get confused

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Fetcher Script
        run: python fetcher.py

      - name: Auto Commit and Push codes.json
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update active codes"
          file_pattern: 'codes.json'
