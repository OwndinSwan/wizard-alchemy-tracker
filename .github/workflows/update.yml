name: Auto Fetch Live Engine Codes
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Run Unified Fetcher Engine
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      run: python fetcher.py
      
    - name: Commit and Push Database Synchronizations
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add codes.json notif.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Engine Auto-Sync: Refreshed multi-source structural tracking arrays" && git push)
