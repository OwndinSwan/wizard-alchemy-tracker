name: Auto Fetch Discord Codes
on:
  schedule:
    - cron: '0 */3 * * *' # Runs every 3 hours
  workflow_dispatch: # Gives you a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save the codes.json file

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Run Fetcher
      env:
        # Pulls your secret token from the vault
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      run: python discord_fetcher.py
      
    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add codes.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-updated Wizard Alchemy codes from Discord" && git push)
        
